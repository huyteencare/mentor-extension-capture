<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="appTitle">Meet Capture</h1>
      <div class="status">
        <span class="dev-badge dev-only">DEV</span>
        <span class="indicator recording"></span>
        <span class="status-text">Recording</span>
      </div>
    </div>

    <div class="section">
      <label>Your Name</label>
      <input type="text" id="mentorName" placeholder="e.g., Teacher Huong">
    </div>

    <div class="section">
      <label>Meeting ID</label>
      <div class="meeting-id" id="meetingId">-</div>
    </div>

    <div class="section">
      <div class="students-header">
        <h2>Students <span class="count" id="studentCount">(0)</span></h2>
        <label class="show-all-label dev-only">
          <input type="checkbox" id="showAllStreams"> show all streams
        </label>
      </div>
      <div class="student-list" id="studentList">
        <div class="placeholder">Waiting for participants...</div>
      </div>
    </div>

    <div class="stats">
      <div>Events: <strong id="eventCount">0</strong></div>
      <div>Queue: <strong id="queueSize">0</strong></div>
    </div>

    <div class="actions">
      <button id="viewerBtn" class="btn btn-primary dev-only">Open Viewer</button>
      <button id="forceUploadBtn" class="btn btn-secondary dev-only">Upload Now</button>
      <button id="clearSessionBtn" class="btn btn-danger" disabled>Clear Session</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
